
sonar.projectKey=documenso
sonar.projectName=documenso
sonar.projectVersion=1.0.2

sonar.sourceEncoding=UTF-8

sonar.sources=.
sonar.exclusions=**/dist/**,**/node_modules/**,**/coverage/**,**/*.test.ts,**/*.test.js,**/tests/**

sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/tests/**/*.ts

sonar.coverage.exclusions=**/*.test.ts,**/*.test.js,**/tests/**,**/*.config.ts,**/*.config.js,**/dist/**,**/node_modules/**,**/coverage/**

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
